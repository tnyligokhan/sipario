name: sipario
description: "Sipario — sipariş, veresiye defteri ve kurye takibi."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Faz 0: native tarafın salt-okunur açacağı SQLite dosyasını Flutter yazar.
  # Faz 2'de yerini Drift alacak; dosya adı ve şema aynı kalacağı için native taraf değişmez.
  sqflite: ^2.4.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
